[mypy]
python_version = 3.12
# Runtime deps (fastembed, psycopg, fastapi, ...) ship partial/no stubs; we
# type-check our own code, not theirs.
ignore_missing_imports = True
namespace_packages = True
explicit_package_bases = True
warn_redundant_casts = True
warn_unused_ignores = False
no_implicit_optional = True

# --- Typing backlog -------------------------------------------------------
# These modules predate the type-check gate and carry pre-existing findings
# (mostly Optional-narrowing and getaddrinfo's str|int tuples). They are
# quarantined so the gate stays green and enforces types on NEW/changed code;
# tighten them incrementally by removing entries here. NOT a licence to add new
# untyped code — new modules are checked in full.
[mypy-app.admin]
ignore_errors = True
[mypy-app.crawler]
ignore_errors = True
[mypy-app.llms_txt]
ignore_errors = True
[mypy-app.main]
ignore_errors = True
[mypy-app.store]
ignore_errors = True
[mypy-app.urlscope]
ignore_errors = True
[mypy-app.retrieval]
ignore_errors = True
