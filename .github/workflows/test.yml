name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint (ruff)
        run: make lint
      - name: Type-check (mypy)
        run: make typecheck

  test:
    runs-on: ubuntu-latest  # or: self-hosted

    services:
      db:
        image: pgvector/pgvector:0.8.2-pg16
        env:
          POSTGRES_USER: self_docs
          POSTGRES_PASSWORD: testpass123
          POSTGRES_DB: self_docs
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U self_docs -d self_docs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 20s

    env:
      POSTGRES_USER: self_docs
      POSTGRES_PASSWORD: testpass123
      POSTGRES_DB: self_docs
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5433"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p 5433 -U self_docs && break
            sleep 1
          done

      - name: Configure embedding model (small/fast for CI)
        run: |
          # Use the small 384-dim model in CI so the suite doesn't download the
          # 1.2GB production default (mxbai-large) on every run. This also
          # exercises `make configure`: it writes EMBEDDING_* into .env (which
          # the Makefile exports to the test venvs) and re-renders 01_schema.sql
          # to vector(384) so the seeded test vectors match the column width.
          python -m pip install --quiet pyyaml
          make configure MODEL=BAAI/bge-small-en-v1.5

      - name: Pre-download embedding model weights for CI
        run: |
          python -m pip install --quiet fastembed
          python -c "from fastembed import TextEmbedding; TextEmbedding(model_name='BAAI/bge-small-en-v1.5')"

      - name: Init database schema
        run: |
          # Apply both init files, matching scripts/migrate.sh's production
          # flow: 01_schema.sql creates the base tables, 02_sources_config.sql
          # adds the extended doc_sources columns (including llms_txt/
          # llms_etag/llms_last_modified) that the DB-dependent tests rely on.
          PGPASSWORD=testpass123 psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -p 5433 -U self_docs -d self_docs \
            -f db/init/01_schema.sql
          PGPASSWORD=testpass123 psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -p 5433 -U self_docs -d self_docs \
            -f db/init/02_sources_config.sql

      - name: Run tests
        run: make test
