services:
  db:
    image: pgvector/pgvector:0.8.2-pg16 # pinned — CVE-2026-3172 fix (parallel HNSW buffer overflow), do NOT float to :pg16
    container_name: self-docs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    # No host port published here in the base file: db must be reachable only
    # inside the compose network in production (mcp-server/ingestion reach
    # `db:5432` over the compose network by container DNS regardless). The
    # host-published loopback mapping needed for `make test` to reach the db
    # directly from 127.0.0.1:5433 lives in docker-compose.test.yml, an
    # explicit opt-in overlay — see Makefile's `test` target.

  ingestion:
    build:
      context: ./ingestion
    container_name: self-docs-ingestion
    restart: unless-stopped
    profiles:
      - full
    depends_on:
      db:
        condition: service_healthy
    environment:
      SYNC_TOKEN: ${SYNC_TOKEN}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      OMP_NUM_THREADS: 1
      ORT_NUM_THREADS: 2
    expose:
      - "8080"
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 1.5G
    # No Traefik exposure — n8n reaches http://ingestion:8080 by container DNS.

  mcp-server:
    build:
      context: ./mcp-server
    container_name: self-docs-mcp-server
    restart: unless-stopped
    profiles:
      - full
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      OMP_NUM_THREADS: 1
      ORT_NUM_THREADS: 2
    expose:
      - "8000"
    networks:
      - default
      - traefik
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/metrics', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      # Container is attached to both `default` and `traefik` networks; tell
      # Traefik explicitly which one to route through.
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik_proxy}"
      - "traefik.http.routers.self-docs-mcp.rule=Host(`${DOCS_MCP_HOSTNAME}`)"
      # Home-lab convention is TLS-terminated `websecure`; override via
      # TRAEFIK_ENTRYPOINT (e.g. to plain `web`) if this LAN's Traefik uses a
      # different entrypoint name or has no TLS resolver configured.
      - "traefik.http.routers.self-docs-mcp.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.self-docs-mcp.tls=true"
      - "traefik.http.services.self-docs-mcp.loadbalancer.server.port=8000"
      # Disable response buffering so the streamable-HTTP/SSE transport isn't
      # delayed/chunked by Traefik's reverse proxy.
      - "traefik.http.services.self-docs-mcp.loadbalancer.responseforwarding.flushinterval=-1"
      # Rate limit: a looping/misbehaving agent must not be able to hammer
      # Postgres via repeated search_docs calls.
      - "traefik.http.middlewares.self-docs-mcp-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.self-docs-mcp-ratelimit.ratelimit.burst=50"
      - "traefik.http.routers.self-docs-mcp.middlewares=self-docs-mcp-ratelimit"

networks:
  default:
    name: self-docs-internal
  traefik:
    name: ${TRAEFIK_NETWORK:-traefik_proxy}
    external: true

volumes:
  pgdata:
