services:
  db:
    image: pgvector/pgvector:0.8.2-pg16 # pinned — CVE-2026-3172 fix (parallel HNSW buffer overflow), do NOT float to :pg16
    container_name: self-docs-db
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Jerusalem}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    # No host port published here in the base file: db must be reachable only
    # inside the compose network in production (mcp-server/ingestion reach
    # `db:5432` over the compose network by container DNS regardless). The
    # host-published loopback mapping needed for `make test` to reach the db
    # directly from 127.0.0.1:5433 lives in docker-compose.test.yml, an
    # explicit opt-in overlay — see Makefile's `test` target.

  ingestion:
    build:
      context: ./ingestion
      args:
        EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-mixedbread-ai/mxbai-embed-large-v1}
    container_name: self-docs-ingestion
    restart: unless-stopped
    profiles:
      - full
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Jerusalem}
      SYNC_TOKEN: ${SYNC_TOKEN}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      OMP_NUM_THREADS: 1
      ORT_NUM_THREADS: 2
      # Embedding model config — resolved by `make configure` into .env from
      # config/models.yaml. The defaults below mirror the registry default
      # (mixedbread-ai/mxbai-embed-large-v1) so `make up` works unconfigured.
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-mixedbread-ai/mxbai-embed-large-v1}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      EMBEDDING_PASSAGE_PROMPT: "${EMBEDDING_PASSAGE_PROMPT:-}"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # Mount the *directory*, not the file: a single-file bind mount pins an
      # inode, and editors that save via atomic rename (vim, VS Code) would
      # leave the container reading stale content after an edit — which is
      # the exact bug this SOURCES_YAML override exists to fix. Do not
      # "simplify" this to a single-file mount.
      - ./ingestion/config:/config:ro
    networks:
      - default
    deploy:
      resources:
        limits:
          # Sized per embedding model by `make configure` (config/models.yaml);
          # default fits the 1024-dim mxbai-large ONNX weights + headroom.
          memory: ${INGESTION_MEM_LIMIT:-2g}
    # No Traefik exposure — reachable inside the compose network.

  mcp-server:
    build:
      context: ./mcp-server
      args:
        EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-mixedbread-ai/mxbai-embed-large-v1}
    container_name: self-docs-mcp-server
    restart: unless-stopped
    profiles:
      - full
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Jerusalem}
      MCP_TOKEN: ${MCP_TOKEN}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      OMP_NUM_THREADS: 1
      ORT_NUM_THREADS: 2
      # Must match the ingestion service's model for vectors to be comparable;
      # `make configure` keeps both in sync via .env. Defaults mirror the
      # registry default (config/models.yaml).
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-mixedbread-ai/mxbai-embed-large-v1}
      EMBEDDING_QUERY_PROMPT: "${EMBEDDING_QUERY_PROMPT:-Represent this sentence for searching relevant passages: }"
    ports:
      - "127.0.0.1:${DOCS_MCP_HOST_PORT:-8081}:8000"
    networks:
      - default
    deploy:
      resources:
        limits:
          # Sized per embedding model by `make configure` (config/models.yaml);
          # default fits the 1024-dim mxbai-large ONNX weights + headroom.
          memory: ${MCP_MEM_LIMIT:-2g}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/metrics', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  default:
    name: self-docs-internal

volumes:
  pgdata:
