<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}self-docs admin{% endblock %}</title>
  <!-- Font stack configured in CSS using system & local font fallbacks -->
  
  <!-- Vendored htmx served from this app's own /admin/static route -->
  <script src="/admin/static/vendor/htmx-1.9.12.min.js"></script>
  <script>
    document.addEventListener("submit", function (event) {
      var form = event.target;
      if (!(form instanceof HTMLFormElement) || !form.hasAttribute("data-confirm-delete")) {
        return;
      }
      var name = form.getAttribute("data-source-name") || "this source";
      var extra = form.getAttribute("data-confirm-extra") || "";
      var message = "Delete source " + name + "? " + extra;
      if (!window.confirm(message.trim())) {
        event.preventDefault();
      }
    });
  </script>
  <style>

    :root {
      /* === Canvas & Surface Hierarchy (Nexus Technical Admin - design.md) === */
      --color-bg: #081425;
      --color-surface-lowest: #040E1F;
      --color-surface-low: #111C2D;
      --color-surface: #152031;
      --color-surface-high: #1F2A3C;
      --color-surface-highest: #2A3548;
      --color-surface-hover: rgba(180, 197, 255, 0.06);
      --color-border: #1E293B;
      --color-border-hover: #334155;
      
      /* === Typography === */
      --color-text: #D8E3FB;
      --color-text-muted: #8D90A0;
      --color-text-inverse: #040E1F;

      /* === Primary (Electric Blue) — for actions, focus rings, active nav === */
      --color-primary: #2563EB;
      --color-primary-hover: #1D4ED8;
      --color-primary-tint: #B4C5FF;
      --color-primary-bg: rgba(37, 99, 235, 0.12);
      --color-primary-glow: rgba(37, 99, 235, 0.25);
      --color-accent: #3B82F6;
      --color-accent-hover: #60A5FA;
      --color-accent-bg: rgba(59, 130, 246, 0.12);

      /* === Secondary === */
      --color-secondary: #B7C8E1;
      --color-secondary-container: #3A4A5F;

      /* === Status Accents (ONLY for feedback indicators) === */
      --color-success: #00E599;
      --color-success-bg: rgba(0, 229, 153, 0.12);
      --color-warning: #FFB800;
      --color-warning-bg: rgba(255, 184, 0, 0.10);
      --color-error: #FF4B4B;
      --color-error-bg: rgba(255, 75, 75, 0.10);

      /* === Typography Stack (design.md) === */
      --font-sans: 'Geist', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      
      /* === Spacing & Radii (design.md Soft Radii: 4px sm, 8px md, 12px lg) === */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --sidebar-width: 260px;
      --sidebar-collapsed: 56px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      margin: 0;
      padding: 0;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* === Typography Helper Tokens (design.md) === */
    .headline-lg {
      font-family: var(--font-sans);
      font-size: 32px;
      font-weight: 700;
      line-height: 40px;
      letter-spacing: -0.02em;
    }
    .headline-md {
      font-family: var(--font-sans);
      font-size: 24px;
      font-weight: 600;
      line-height: 32px;
      letter-spacing: -0.01em;
    }
    .headline-sm {
      font-family: var(--font-sans);
      font-size: 18px;
      font-weight: 600;
      line-height: 24px;
    }
    .body-lg {
      font-family: var(--font-sans);
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
    }
    .body-md {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
    }
    .body-sm {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 400;
      line-height: 18px;
    }
    .label-mono {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      line-height: 16px;
      letter-spacing: 0.02em;
    }
    .label-caps {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 700;
      line-height: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
    }

    /* App Shell & Sidebar */
    .app-shell {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: var(--sidebar-width);
      background: var(--color-surface-low);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
      transition: width 0.2s ease;
    }
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      transition: margin-left 0.2s ease;
    }
    .content-container {
      max-width: 76rem;
      margin: 2rem auto;
      padding: 0 1.75rem;
    }

    /* Sidebar brand */
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--color-border);
      text-decoration: none;
    }
    .brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-hover) 100%);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.85rem;
      color: #fff;
      letter-spacing: -0.02em;
      box-shadow: 0 0 12px var(--color-primary-glow);
      flex-shrink: 0;
    }
    .brand-text {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--color-text);
      letter-spacing: -0.01em;
    }

    /* Nav items */
    .nav-section-label {
      display: block;
      padding: 1.5rem 1rem 0.5rem;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 700;
      line-height: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1rem;
      margin: 0.2rem 0.5rem;
      border-radius: var(--radius-sm);
      color: var(--color-text-muted);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.15s ease;
      position: relative;
    }
    .nav-item:hover {
      background: var(--color-surface-hover);
      color: var(--color-text);
      text-decoration: none;
    }
    .nav-item.active {
      background: var(--color-primary-bg);
      color: var(--color-primary-tint);
      font-weight: 600;
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.35rem;
      bottom: 0.35rem;
      width: 3px;
      background: var(--color-primary);
      border-radius: 2px;
      box-shadow: 0 0 8px var(--color-primary-glow);
    }
    .nav-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: var(--color-text-muted);
    }
    .nav-item.active .nav-icon {
      color: var(--color-primary-tint);
    }
    @media (max-width: 1024px) {
      .sidebar { width: var(--sidebar-collapsed); }
      .main-content { margin-left: var(--sidebar-collapsed); }
      .brand-text, .nav-label, .nav-section-label { display: none; }
      .sidebar-brand { justify-content: center; padding: 1rem 0.5rem; }
      .nav-item { justify-content: center; padding: 0.6rem; margin: 0.15rem 0.25rem; }
    }

    /* Cards (Level 1 Glassmorphism - design.md) */
    .card {
      background: rgba(15, 23, 42, 0.80);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 24px -4px rgba(2, 6, 23, 0.5);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      border-color: var(--color-border-hover);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 0.85rem;
      margin-bottom: 1.25rem;
    }
    .card-header h2 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* Data Grids & Tables (design.md baseline specs) */
    table, .table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
      font-size: 13px;
    }
    th, .table th {
      background: rgba(4, 14, 31, 0.6);
      color: var(--color-text-muted);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 700;
      line-height: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--color-border);
      border-top: 1px solid var(--color-border);
      text-align: left;
    }
    td, .table td {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--color-border);
      vertical-align: middle;
      font-size: 13px;
      line-height: 18px;
    }
    tbody tr, .table tbody tr {
      height: 40px;
    }
    tr:last-child td, .table tr:last-child td {
      border-bottom: none;
    }
    tbody tr:nth-child(even), .table tbody tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.015);
    }
    tbody tr:hover, .table tbody tr:hover {
      background: var(--color-surface-hover);
    }

    /* Source Grid Cards (Inclusion Cards - design.md) */
    .source-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
      margin-top: 1rem;
    }
    .source-card {
      background: rgba(21, 32, 49, 0.75);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.2s ease;
    }
    .source-card:hover {
      border-color: var(--color-border-hover);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      transform: translateY(-1px);
    }
    .source-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .source-card-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--color-text);
      word-break: break-word;
    }
    .source-card-body {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--color-text-muted);
      margin-bottom: 1rem;
      word-break: break-all;
    }
    .source-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--color-border);
      padding-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--color-text-muted);
    }

    /* Pending & Warning Banners */
    .pending-section {
      background: linear-gradient(180deg, rgba(255, 184, 0, 0.08) 0%, var(--color-surface) 100%);
      border: 1px solid var(--color-warning);
      border-top: 2px solid var(--color-warning);
      padding: 1.5rem;
      border-radius: var(--radius-lg);
      margin-bottom: 2rem;
      box-shadow: 0 4px 20px rgba(255, 184, 0, 0.05);
    }
    .pending-section h2 {
      margin-top: 0;
      color: var(--color-warning);
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .proposed-by {
      display: inline-block;
      background: var(--color-warning-bg);
      color: var(--color-warning);
      border: 1px solid rgba(255, 184, 0, 0.35);
      font-weight: 600;
      padding: 0.15rem 0.55rem;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-family: var(--font-mono);
    }

    /* Badges & Status LEDs */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: var(--font-mono);
      line-height: 1;
    }
    .badge-primary {
      background: var(--color-primary-bg);
      color: var(--color-primary-tint);
      border: 1px solid rgba(37, 99, 235, 0.3);
    }
    .badge-success {
      background: var(--color-success-bg);
      color: var(--color-success);
      border: 1px solid rgba(0, 229, 153, 0.3);
    }
    .badge-warning {
      background: var(--color-warning-bg);
      color: var(--color-warning);
      border: 1px solid rgba(255, 184, 0, 0.3);
    }
    .badge-error {
      background: var(--color-error-bg);
      color: var(--color-error);
      border: 1px solid rgba(255, 75, 75, 0.3);
    }

    @keyframes pulse-dot {
      0% { box-shadow: 0 0 0 0 rgba(180, 197, 255, 0.6); }
      70% { box-shadow: 0 0 0 7px rgba(180, 197, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(180, 197, 255, 0); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-led {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 6px;
    }
    .status-led-ok { background: var(--color-success); box-shadow: 0 0 8px rgba(0, 229, 153, 0.5); }
    .status-led-syncing { background: var(--color-primary-tint); animation: pulse-dot 1.5s infinite; }
    .status-led-error { background: var(--color-error); box-shadow: 0 0 8px rgba(255, 75, 75, 0.5); }
    .status-led-idle { background: var(--color-text-muted); opacity: 0.4; }

    /* Alerts */
    .error {
      color: var(--color-error);
      background: var(--color-error-bg);
      border: 1px solid var(--color-error);
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
    }
    .message {
      color: var(--color-success);
      background: var(--color-success-bg);
      border: 1px solid var(--color-success);
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
    }

    /* Form inputs & Sections */
    .form-section {
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .form-section:last-child { border-bottom: none; margin-bottom: 0; }
    .form-section-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--color-text-muted); margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-top: 1.25rem;
      margin-bottom: 0.35rem;
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--color-text);
    }
    input[type=text], input[type=url], input[type=number], input[type=password], textarea, select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      box-sizing: border-box;
      background: var(--color-surface-lowest);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      font-family: var(--font-mono);
      font-size: 0.875rem;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input[type=text]:focus, input[type=url]:focus, input[type=number]:focus, input[type=password]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px var(--color-primary-glow);
    }
    input:disabled, select:disabled, button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .hint {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      margin-top: 0.35rem;
      margin-bottom: 0.5rem;
      line-height: 1.45;
    }
    .hint code {
      background: rgba(255, 255, 255, 0.08);
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-family: var(--font-mono);
      color: var(--color-text);
    }

    /* Actions & Buttons (design.md button system) */
    .actions form { display: inline; }
    .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn-group {
      display: inline-flex;
      gap: 0.35rem;
      align-items: center;
    }
    button, .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.48rem 0.95rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-surface-hover);
      color: var(--color-text);
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      white-space: nowrap;
    }
    button:hover, .btn:hover {
      border-color: var(--color-border-hover);
      background: rgba(255, 255, 255, 0.08);
      text-decoration: none;
    }
    button[type=submit], .btn-primary {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
      box-shadow: 0 0 14px var(--color-primary-glow);
    }
    button[type=submit]:hover, .btn-primary:hover {
      background: var(--color-primary-hover);
      border-color: var(--color-primary-hover);
      text-decoration: none;
      box-shadow: 0 0 18px var(--color-primary-glow);
    }
    .btn-danger {
      border-color: rgba(255, 75, 75, 0.4);
      color: var(--color-error);
      background: rgba(255, 75, 75, 0.08);
    }
    .btn-danger:hover {
      background: var(--color-error);
      color: #fff;
    }

    /* HTMX Spinner Indicator */
    .htmx-indicator {
      display: none;
    }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator {
      display: inline-block;
    }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Sitemaps & Mismatch */
    .col-sitemap {
      font-weight: bold;
      background: rgba(255, 184, 0, 0.04);
    }
    .col-sitemap.sitemap-mismatch, .sitemap-mismatch {
      background: var(--color-error-bg);
      border: 1px solid rgba(255, 75, 75, 0.4);
    }
    .mismatch-warning {
      display: inline-block;
      margin-top: 0.3rem;
      color: var(--color-error);
      font-weight: bold;
      font-size: 0.8em;
    }
    .muted {
      color: var(--color-text-muted);
      font-style: italic;
    }
    h1, h2, h3 {
      color: var(--color-text);
      font-weight: 600;
      margin-top: 0;
    }
    a {
      color: var(--color-accent);
      text-decoration: none;
      transition: color 0.15s;
    }
    a:hover {
      color: var(--color-accent-hover);
      text-decoration: underline;
    }

    /* Filter Toolbar & Custom Scrollbars */
    .filter-toolbar {
      display: grid;
      grid-template-columns: 220px 1fr auto;
      gap: 1rem;
      align-items: end;
      padding: 1rem;
      background: var(--color-surface-lowest);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
    }
    @media (max-width: 768px) {
      .filter-toolbar { grid-template-columns: 1fr; }
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border-hover); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-text-muted); }
  </style>
</head>
<body hx-boost="true">
  <div class="app-shell">
    <aside class="sidebar">
      <a href="/admin" class="sidebar-brand">
        <div class="brand-icon">SD</div>
        <span class="brand-text">self-docs</span>
      </a>
      <nav class="sidebar-nav">
        <span class="nav-section-label">MANAGEMENT</span>
        <a href="/admin" class="nav-item {% block nav_sources %}{% endblock %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M3 3h14a2 2 0 012 2v10a2 2 0 01-2 2H3a2 2 0 01-2-2V5a2 2 0 012-2zm0 2v10h14V5H3z"/>
          </svg>
          <span class="nav-label">Sources</span>
        </a>
        <a href="/admin/docs" class="nav-item {% block nav_docs %}{% endblock %}">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M4 4a2 2 0 012-2h8l4 4v10a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/>
          </svg>
          <span class="nav-label">Knowledge Base</span>
        </a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="content-container">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
</body>
</html>
