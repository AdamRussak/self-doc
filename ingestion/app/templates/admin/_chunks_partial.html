<td colspan="6" style="background: rgba(4, 14, 31, 0.6); padding: 1.25rem 1.5rem; border-bottom: 2px solid var(--color-primary); border-top: 1px solid var(--color-border);">
  <div class="chunk-drawer">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem;">
      <h3 style="margin: 0; font-size: 0.95rem; color: var(--color-primary-tint); display: flex; align-items: center; gap: 0.5rem;">
        <span>Indexed Chunks ({{ chunks|length }})</span>
      </h3>
      <button type="button" class="btn" style="padding: 0.25rem 0.6rem; font-size: 0.75rem;" onclick="this.closest('tr').innerHTML=''">
        &times; Close Chunks
      </button>
    </div>

    {% if chunks %}
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      {% for c in chunks %}
      <div style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 1rem; transition: border-color 0.15s ease;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; border-bottom: 1px solid var(--color-border); padding-bottom: 0.6rem;">
          <span class="heading-pill">
            {{ c.heading_path or "(Root Document / No Heading)" }}
          </span>
          <span class="badge" style="background: rgba(255,255,255,0.06); border: 1px solid var(--color-border);">
            Chunk #{{ c.chunk_index }}
          </span>
        </div>
        <pre style="margin: 0; white-space: pre-wrap; word-break: break-word; font-family: var(--font-mono); font-size: 0.8rem; line-height: 1.5; color: var(--color-text); background: rgba(0,0,0,0.3); padding: 0.85rem; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.04); max-height: 400px; overflow-y: auto;">{{ c.content }}</pre>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <p class="muted" style="margin: 0; font-style: italic;">No pre-indexed chunks found for this page.</p>
    {% endif %}
  </div>
</td>
