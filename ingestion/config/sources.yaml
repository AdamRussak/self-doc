# Validated at service startup with pydantic; the service fails fast on duplicate
# names, missing/invalid base_url, or unknown keys.
# See IMPLEMENTATION_PLAN.md §2 "sources.yaml schema".
#
# Rule: includes match whole path segments; excludes match any leading substring.
#
# include_prefixes vs exclude_prefixes matching is ASYMMETRIC (see
# app/urlscope.py:path_allowed docstring for the full rationale):
#   - include_prefixes match at a path-SEGMENT BOUNDARY only (a prefix must
#     be followed by '/' or end-of-string). '/traefik' will NOT match
#     '/traefik-hub/...' — this is load-bearing; a loose match here admits
#     an entire wrong product into the corpus.
#   - exclude_prefixes match via plain SUBSTRING/startswith (no boundary
#     requirement), so a prefix WITHOUT a trailing slash can over-match a
#     sibling segment (e.g. exclude '/docs/changelog' also excludes a
#     hypothetical '/docs/changelog-archive/'). This is intentional and
#     safe: over-matching an exclude only skips a wanted page (fails
#     closed), whereas over-matching an include would admit unwanted
#     content (fails open). It also lets a short exclude like
#     '/traefik/v2' filter an entire family of versioned segments
#     ('/traefik/v2.0', '/traefik/v2.11', ...) without enumerating every
#     minor version.
#   - A trailing slash on EITHER key is normalized away before matching
#     (it does not toggle boundary-safety) — e.g. exclude_prefixes:
#     ["/compose/releases/"] excludes the bare path "/compose/releases"
#     itself too, not just its children.
sources:
  - name: fastapi
    base_url: https://fastapi.tiangolo.com/
    sitemap: https://fastapi.tiangolo.com/sitemap.xml
    include_prefixes: ["/tutorial/", "/reference/", "/advanced/", "/deployment/"]
    exclude_prefixes: ["/release-notes/", "/newsletter/"]
    max_pages: 500
    language: english
    rate_limit_rps: 1.0

  - name: nextjs
    base_url: https://nextjs.org/docs
    include_prefixes: ["/docs"]
    exclude_prefixes: ["/docs/messages/", "/docs/architecture/"]
    max_pages: 500
    language: english
    rate_limit_rps: 1.0

  - name: pgvector-readme
    base_url: https://github.com/pgvector/pgvector
    include_prefixes: ["/pgvector/pgvector"]
    max_pages: 3
    language: english
    rate_limit_rps: 1.0

  # --- Phase 2 additions ---

  - name: appwrite
    base_url: https://appwrite.io/docs
    sitemap: https://appwrite.io/sitemap.xml
    include_prefixes: ["/docs"]
    # No trailing slash: substring-matches '/docs/changelog' and
    # '/docs/sdks' as prefixes (see file-header note on exclude_prefixes
    # semantics), so e.g. a hypothetical '/docs/changelogging' page would
    # also be excluded. Accepted as-is — over-exclusion here is a safe
    # failure mode, not a scope leak.
    exclude_prefixes: ["/docs/changelog", "/docs/sdks"]
    max_pages: 400
    language: english
    rate_limit_rps: 1.0

  - name: traefik
    base_url: https://doc.traefik.io/traefik/
    # https://doc.traefik.io/traefik/sitemap.xml 404s (verified via curl); the
    # real sitemap lives at the doc.traefik.io root and covers all product
    # docs on this host (traefik, traefik-enterprise, traefik-hub,
    # traefik-mesh). include_prefixes below scopes it to traefik only,
    # using segment-boundary matching so it does NOT also match
    # /traefik-hub/, /traefik-enterprise/, /traefik-mesh/ (verified: these
    # were 56% of a prior 1882-URL crawl before this fix).
    sitemap: https://doc.traefik.io/sitemap.xml
    include_prefixes: ["/traefik/"]
    # Verified against https://doc.traefik.io/sitemap.xml (2026-07-18): the
    # current /traefik/ sitemap does NOT list any dotted version paths
    # (/traefik/v1.7/..., /traefik/v2.11/...) today — the live sitemap only
    # contains the unversioned current-stable tree plus /traefik/migrate/
    # and /traefik/migration/ guide pages (which mention v1/v2/v3 in their
    # own slugs, e.g. /traefik/migrate/v2-to-v3/, and are legitimately
    # in-scope migration docs, not old-version docs). However, the old
    # versioned doc trees ARE still live and directly reachable
    # (doc.traefik.io/traefik/v1.7/, /v2.11/, etc. all return 200 with
    # version-specific <title> content) — they are just not currently
    # linked from the sitemap. This exclude is a defensive guard against
    # them entering the corpus via a future sitemap change or a BFS
    # fallback that follows an in-page version-switcher link. These
    # excludes rely on exclude_prefixes' substring semantics (see
    # file-header note): '/traefik/v1' and '/traefik/v2' match ANY
    # versioned segment starting with that string (v1.0, v1.7, v2.0,
    # v2.5, v2.10, v2.11, ...) without enumerating every minor version.
    exclude_prefixes: ["/traefik/v1", "/traefik/v2"]
    max_pages: 400
    language: english
    rate_limit_rps: 1.0

  - name: docker-compose
    base_url: https://docs.docker.com/compose/
    sitemap: https://docs.docker.com/sitemap.xml
    include_prefixes: ["/compose"]
    exclude_prefixes: ["/compose/releases/"]
    max_pages: 200
    language: english
    rate_limit_rps: 1.0

  - name: structlog
    base_url: https://www.structlog.org/en/stable/
    include_prefixes: ["/en/stable"]
    exclude_prefixes: ["/en/stable/_modules/"]
    max_pages: 100
    language: english
    rate_limit_rps: 1.0
  - name: pydantic
    # docs.pydantic.dev moved: base_url and its sitemap 301-redirect to
    # pydantic.dev/docs/... (verified via curl). The new pydantic.dev/docs
    # sitemap mixes three products (validation library, pydantic-ai,
    # logfire); include_prefixes is scoped to /docs/validation/latest/ only
    # so this source stays the pydantic *validation* library docs and does
    # not pull in the pydantic-ai or logfire corpora.
    base_url: https://pydantic.dev/docs/validation/latest/
    sitemap: https://pydantic.dev/docs/sitemap.xml          # Optional (falls back to recursive BFS crawl if omitted)
    include_prefixes: ["/docs/validation/latest/"]           # Only crawl URLs starting with this prefix
    # No trailing slash: substring-matches as a prefix (see file-header
    # note on exclude_prefixes semantics), so this also excludes any
    # sibling path merely starting with "changelog" (e.g. a hypothetical
    # /docs/validation/latest/changelog-archive/). Accepted as-is —
    # over-exclusion here is a safe failure mode, not a scope leak.
    exclude_prefixes: ["/docs/validation/latest/changelog"]  # Skip changelogs, API diffs, etc.
    max_pages: 100                                          # Hard safety cap; /docs/validation/latest/ has ~89 URLs in the sitemap
    language: english
    rate_limit_rps: 1.0
  - name: mcp
    base_url: https://modelcontextprotocol.io/
    # WARNING: base_url's path is "/", which is NOT covered by
    # include_prefixes below. This only passes config validation because a
    # sitemap is declared (the BFS-seed-filter check short-circuits when a
    # sitemap is present). If this sitemap URL ever 404s (as happened with
    # the traefik source above), the crawler falls back to BFS seeded on
    # "/", which include_prefixes would then filter out entirely — silently
    # indexing 0 pages. If that ever happens, fix by adding "/" is not
    # viable (too broad); instead point base_url at an in-scope path (e.g.
    # https://modelcontextprotocol.io/docs) or verify/update the sitemap URL.
    sitemap: https://modelcontextprotocol.io/sitemap.xml          # Optional (falls back to recursive BFS crawl if omitted)
    include_prefixes: ["/docs","/extensions","/specification"]           # Only crawl URLs starting with this prefix
    # Verified against https://modelcontextprotocol.io/sitemap.xml
    # (2026-07-19): 135 URLs fall under /docs (16) + /extensions (8) +
    # /specification (111) combined. Capped well above that with headroom
    # for future doc growth.
    max_pages: 200
    language: english
    rate_limit_rps: 1.0
